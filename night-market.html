<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henna Gallery | 865 Night Market</title>
    <style>
        /* Base Styles */
        body {
            background: linear-gradient(135deg, #3f1a4f 0%, #14006f 100%);
            background-attachment: fixed; /* Keeps the gradient from stretching/breaking as you scroll */
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            text-align: center;
            margin: 10px 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            font-style: italic; /* Makes it feel even 'more' serif/elegant */
            margin-bottom: 20px;
        }

        hr {
            width: 85%;
            margin-left: auto;
            margin-right: auto;
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.3); /* Subtle white line */
            margin-bottom: 20px;
        }

        /* Star Alignment Wrapper */
        .title-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px; /* Matches your H2 margin preference */
        }
        
        .star {
            font-size: 1.4rem; /* Adjusted to match the larger H2 size */
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            line-height: 1;
        }

        /* Social links container */
        .social-links {
          display: flex;
          flex-direction: column;
          align-items: center;    /* Centers the links horizontally */
          justify-content: center;
          gap: 0.6rem;
          width: 100%;
          margin: 15px 0 25px 0;  /* Balanced spacing between HR and Title */
        }

        /* Each social link */
        .social-link {
          font-family: 'Inter', sans-serif;
          font-size: 15px;
          color: #e2e2e2;
          text-decoration: none;
          display: flex;
          align-items: center;
          gap: 10px;              /* Space between icon and text */
          transition: all 0.3s ease;
        }

        .social-link:hover {
          color: #ffffff;
          transform: translateY(-1px); /* Subtle lift on hover */
        }

        /* Social icons - Forced to bright white */
        .social-icon {
          width: 18px;            /* Slightly larger for better visibility */
          height: 18px;
          /* brightness(0) invert(1) turns any colored icon to white */
          filter: grayscale(100%) brightness(0) invert(1); 
          opacity: 0.8;           /* Slightly softened when not hovered */
          transition: all 0.3s ease;
        }

        .social-link:hover .social-icon {
          filter: none;           /* Returns to original Instagram colors on hover */
          opacity: 1;
          transform: scale(1.1);
        }

        /* The Grid - Mobile Friendly (2 columns) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Image Cards */
        .image-card {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }

        .image-card:active {
            transform: scale(0.96); /* Visual feedback when tapped */
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Lightbox Overlay */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: default;
        }

        /* Close Button */
        #close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 35px;
            line-height: 1;
            cursor: pointer;
            padding: 10px;
        }

        /* Booking Info Section */
        /* Button & Star Alignment */
        .info-box {
            max-width: 500px;
            margin: 0 auto 30px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.07); /* Very subtle glass effect */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .info-box p {
            margin: 8px 0;
            font-size: 1rem;
            line-height: 1.5;
            color: #f0f0f0;
        }

        .price-tag {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #FFD700; /* Gold color for the price */
            font-weight: 700;
            display: block;
            margin-bottom: 10px;
        }

        .highlight {
            color: #ffffff;
            font-weight: 600;
        }

        .discount-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            border: 1px dashed rgba(255, 215, 0, 0.5);
        }

        .button-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .button-star {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            /* Keeps stars from moving when button is pressed */
            user-select: none;
        }

        .book-button {
            display: inline-block;
            padding: 14px 35px;
            background: #ffffff;
            color: #1a0b2e;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            font-family: -apple-system, sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .book-button:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        /* Ensure the discount badge has some breathing room */
        .discount-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 15px 0; /* Space between text above and button below */
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }

        .booking-footer h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>865 Night Market </h1>
    <hr>

    <div class="title-wrap">
        <span class="star">✧</span>
        <h2>Henna Designs Gallery</h2>
        <span class="star">✧</span>
    </div>

    <div class="gallery-grid" id="gallery"></div>

    <div id="lightbox">
        <span id="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <script>
        // Your specific image list
        const imageFiles = [
            'henna1.jpeg', 'henna2.jpeg', 'henna3.jpeg', 'henna4.jpeg',
            'henna5.jpeg', 'henna6.jpeg', 'henna7.jpeg', 'henna8.jpeg',
            'henna17.jpeg', 'henna18.jpeg', 'henna19.jpeg', 'henna20.jpeg',
            'henna9.jpeg', 'henna10.jpeg', 'henna11.jpeg', 'henna12.jpeg',
            'henna13.jpeg', 'henna14.jpeg', 'henna15.jpeg', 'henna16.jpeg'
        ];

        const folderPath = 'night-market-imgs/';
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');

        // Create the grid items
        imageFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'image-card';
            
            const img = document.createElement('img');
            img.src = folderPath + file;
            img.loading = "lazy"; // Saves data for mobile users
            
            card.onclick = () => {
                lightboxImg.src = folderPath + file;
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Prevents background scrolling
            };

            card.appendChild(img);
            gallery.appendChild(card);
        });

        // Close logic
        function hideLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        closeBtn.onclick = hideLightbox;
        
        // Close if clicking outside the image
        lightbox.onclick = (e) => {
            if (e.target !== lightboxImg) {
                hideLightbox();
            }
        };
    </script>

    <div class="booking-footer">
        <hr class="short-hr">
        <h3>Love your henna?</h3>
        <p style="text-align: center;">Book me for your next event!</p>
        
        <div class="info-box">
            <span class="price-tag">Starting at $15 per design</span>
            <p>Available for <span class="highlight">Birthdays, Eid, Weddings, & Private Events</span></p>
            
            <div class="discount-badge">✨ 10% Group Discount</div>
            
            <div class="button-container">
                <span class="button-star">✧</span>
                <a href="https://ig.me/m/YOUR_USERNAME" class="book-button">Book Now</a>
                <span class="button-star">✧</span>
            </div>
        </div>
    </div>

    <div class="social-links">
        <a href="https://instagram.com/henna.by.nia" target="_blank" rel="noopener" class="social-link">
          <img src="icons/instagram.svg" alt="Instagram" class="social-icon" /> @henna.by.nia
        </a>
    </div>

</body>
</html>
